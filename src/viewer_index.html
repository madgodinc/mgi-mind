<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MGI-Mind — memory visualization</title>
<style>
  :root { --bg:#05070d; --fg:#cfe3ff; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif; overflow:hidden; }
  #graph { position:fixed; inset:0; }
  .hud { position:fixed; z-index:10; backdrop-filter: blur(8px);
    background:rgba(10,16,28,.62); border:1px solid rgba(120,160,255,.18); border-radius:12px; padding:12px 14px; }
  #title { top:14px; left:14px; max-width:320px; }
  #title h1 { margin:0 0 4px; font-size:15px; letter-spacing:.3px; color:#eaf2ff; }
  #title p { margin:0; font-size:12px; line-height:1.45; opacity:.7; }

  #searchbar { top:14px; left:50%; transform:translateX(-50%); display:flex; gap:8px; align-items:center; }
  #search { width:240px; background:rgba(8,14,26,.6); border:1px solid rgba(120,160,255,.25);
    color:#dce8ff; border-radius:8px; padding:7px 11px; font-size:13px; outline:none; }
  #search:focus { border-color:rgba(120,160,255,.6); }
  #filterKind { background:rgba(8,14,26,.6); color:#dce8ff; border:1px solid rgba(120,160,255,.25);
    border-radius:8px; padding:7px 8px; font-size:12px; outline:none; cursor:pointer; }
  #projmenu { position:relative; }
  #projbtn, #editmode, #langbtn { background:rgba(60,110,220,.18); color:#dce8ff; border:1px solid rgba(120,160,255,.3);
    border-radius:8px; padding:7px 11px; font-size:12px; cursor:pointer; }
  #editmode.on { background:rgba(255,120,90,.25); border-color:rgba(255,140,100,.55); color:#ffd9cc; }
  #projlist, #langlist { display:none; position:absolute; top:38px; right:0; min-width:170px;
    background:rgba(10,16,28,.95); border:1px solid rgba(120,160,255,.25); border-radius:10px;
    padding:6px; backdrop-filter:blur(8px); box-shadow:0 10px 30px rgba(0,0,0,.5); z-index:20; }
  #projlist.show, #langlist.show { display:block; }
  #projlist .item, #langlist .item { padding:7px 10px; border-radius:7px; font-size:13px; cursor:pointer; display:flex; justify-content:space-between; gap:12px; }
  #projlist .item:hover, #langlist .item:hover { background:rgba(80,140,255,.18); }
  #projlist .item.active, #langlist .item.active { background:rgba(80,200,140,.2); border:1px solid rgba(80,220,150,.4); }
  #projlist .item .c { opacity:.5; font-size:11px; }
  #langmenu { position:relative; }

  #legend { top:14px; right:14px; font-size:12px; }
  #legend .row { display:flex; align-items:center; gap:8px; margin:3px 0; }
  #legend .head { opacity:.6; font-size:10px; letter-spacing:1px; margin:8px 0 6px; }
  #legend .head:first-child { margin-top:0; }
  .dot { width:10px; height:10px; border-radius:50%; box-shadow:0 0 8px currentColor; }
  .kind-core-memory { color:#39d98a; } .kind-core-entity { color:#c792ff; } .kind-core-library { color:#ffd166; }
  .pulse-write { color:#39d98a; } .pulse-read { color:#3aa0ff; } .pulse-process { color:#ffb020; }

  #controls { bottom:14px; left:14px; font-size:12px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; max-width:96vw; }
  #controls label { display:flex; align-items:center; gap:6px; cursor:pointer; opacity:.85; }
  #controls .group { display:flex; gap:8px; align-items:center; padding-right:14px; border-right:1px solid rgba(120,160,255,.15); }
  #controls .group:last-child { border:none; }
  #controls .lbl { opacity:.6; }
  button { background:rgba(60,110,220,.18); color:#dce8ff; border:1px solid rgba(120,160,255,.3);
    border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer; }
  button:hover { background:rgba(60,110,220,.32); }
  button.on { background:rgba(80,200,140,.28); border-color:rgba(80,220,150,.5); }

  #tip { position:fixed; z-index:20; pointer-events:none; max-width:300px; display:none;
    background:rgba(8,14,26,.92); border:1px solid rgba(120,160,255,.3); border-radius:10px;
    padding:10px 12px; font-size:12px; line-height:1.45; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  #tip .t-kind { font-size:10px; text-transform:uppercase; letter-spacing:1px; opacity:.7; }
  #tip .t-title { font-weight:600; color:#eaf2ff; margin:3px 0; }
  #tip .t-meta { opacity:.6; font-size:11px; margin-top:4px; }

  #inside { position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 40%, rgba(20,40,80,.55), rgba(3,5,12,.92) 70%);
    backdrop-filter: blur(4px); opacity:0; transition:opacity .45s ease; }
  #inside.show { display:flex; opacity:1; }
  #inside .card { position:relative; width:min(640px,86vw); max-height:80vh; overflow:auto;
    background:linear-gradient(180deg, rgba(14,22,40,.96), rgba(8,12,24,.96));
    border:1px solid rgba(140,180,255,.3); border-radius:18px; padding:26px 28px;
    box-shadow:0 0 60px rgba(60,120,255,.25), inset 0 0 40px rgba(40,80,180,.12);
    transform:scale(.82); transition:transform .45s cubic-bezier(.2,.9,.3,1.2); }
  #inside.show .card { transform:scale(1); }
  #inside .c-kind { font-size:11px; letter-spacing:2px; text-transform:uppercase; opacity:.6; }
  #inside h2 { margin:6px 0 10px; color:#eaf2ff; font-size:20px; }
  #inside .addr { font-size:12px; opacity:.6; margin-bottom:16px; line-height:1.6; font-family: ui-monospace, Menlo, monospace; }
  #inside .addr b { color:#9fc0ff; font-weight:600; }
  #inside .sec-label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; opacity:.5; margin:0 0 6px; }
  #inside .body { font-size:14px; line-height:1.62; white-space:pre-wrap; opacity:.94; background:rgba(0,0,0,.22); border-radius:10px; padding:12px 14px; }
  #inside .understood { margin-top:16px; padding:12px 14px; border-radius:10px; background:rgba(80,200,140,.08); border:1px solid rgba(80,200,140,.22); }
  #inside .understood .u-label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#39d98a; opacity:.85; margin-bottom:6px; }
  #inside .understood .u-text { font-size:13.5px; line-height:1.55; opacity:.92; }
  #inside .links { margin-top:18px; padding-top:14px; border-top:1px solid rgba(120,160,255,.18); }
  #inside .links h3 { margin:0 0 8px; font-size:12px; opacity:.6; letter-spacing:1px; text-transform:uppercase; }
  #inside .link { font-size:12px; opacity:.85; padding:3px 0; }
  #inside .close { position:absolute; top:18px; right:22px; font-size:13px; opacity:.7; cursor:pointer; }
  #inside .editrow { margin-top:18px; display:none; gap:10px; }
  #inside.editing .editrow { display:flex; }
  #inside .editrow button { font-size:13px; padding:8px 14px; border-radius:9px; }
  #inside .b-del { background:rgba(255,70,70,.16); color:#ffc7c7; border:1px solid rgba(255,90,90,.4); }
  #inside textarea { width:100%; min-height:160px; margin-top:8px; background:rgba(0,0,0,.3); color:#eaf2ff;
    border:1px solid rgba(120,160,255,.3); border-radius:10px; padding:12px; font-size:14px; line-height:1.6; resize:vertical; outline:none; display:none; }
  #inside.edit-open textarea { display:block; }
  #inside.edit-open .body { display:none; }
  #inside .card::-webkit-scrollbar { width:10px; }
  #inside .card::-webkit-scrollbar-thumb { background:rgba(120,160,255,.3); border-radius:6px; }
</style>
</head>
<body>
<div id="graph"></div>

<div id="title" class="hud">
  <h1>🧠 <span data-i18n="appName">MGI-Mind — the brain</span></h1>
  <p data-i18n="intro">Prototype. Hover (summary after ~1s), click a core to dive inside.</p>
</div>

<div id="searchbar" class="hud">
  <input id="search" autocomplete="off">
  <select id="filterKind">
    <option value="" data-i18n="filterAll">all types</option>
    <option value="memory" data-i18n="kMemory">memory</option>
    <option value="entity" data-i18n="kEntity">entities</option>
    <option value="library" data-i18n="kLibrary">regions</option>
  </select>
  <div id="projmenu"><button id="projbtn"></button><div id="projlist"></div></div>
  <button id="editmode"></button>
  <div id="langmenu"><button id="langbtn">🌐 EN</button><div id="langlist"></div></div>
</div>

<div id="legend" class="hud">
  <div class="head" data-i18n="legCores">CORES</div>
  <div class="row"><span class="dot kind-core-memory"></span> <span data-i18n="kMemory">memory</span></div>
  <div class="row"><span class="dot kind-core-entity"></span> <span data-i18n="kEntitySing">entity</span></div>
  <div class="row"><span class="dot kind-core-library"></span> <span data-i18n="kRegion">region</span></div>
  <div class="head" data-i18n="legPulses">IMPULSES</div>
  <div class="row"><span class="dot pulse-write"></span> <span data-i18n="pWrite">write</span></div>
  <div class="row"><span class="dot pulse-read"></span> <span data-i18n="pRead">read</span></div>
  <div class="row"><span class="dot pulse-process"></span> <span data-i18n="pProcess">process</span></div>
</div>

<div id="controls" class="hud">
  <div class="group"><span class="lbl" data-i18n="cMode">mode:</span>
    <button id="b3d" class="on">3D</button><button id="b2d">2D</button></div>
  <div class="group"><span class="lbl" data-i18n="cPhysics">physics:</span>
    <button id="pDyn" class="on" data-i18n="phDynamic">dynamic</button>
    <button id="pStat" data-i18n="phStatic">static</button>
    <button id="pSave" data-i18n="phPin">📌 pin</button>
    <button id="pReset" data-i18n="phReset">↺ reset</button></div>
  <div class="group"><span class="lbl" data-i18n="cStyle">style:</span>
    <button data-style="neon" class="on" data-i18n="stNeon">neon</button>
    <button data-style="organic" data-i18n="stOrganic">organic</button>
    <button data-style="schematic" data-i18n="stSchematic">schematic</button></div>
  <div class="group"><span class="lbl" data-i18n="cCores">cores:</span>
    <button data-shape="sphere" class="on" data-i18n="shSphere">spheres</button>
    <button data-shape="ico" data-i18n="shCrystal">crystals</button>
    <button data-shape="point" data-i18n="shPoint">points</button></div>
  <div class="group"><span class="lbl" data-i18n="cBg">bg:</span>
    <button data-bg="nebula" class="on" data-i18n="bgNebula">nebula</button>
    <button data-bg="stars" data-i18n="bgStars">stars</button>
    <button data-bg="plain" data-i18n="bgPlain">plain</button></div>
  <div class="group">
    <label><input type="checkbox" id="cPulse" checked> <span data-i18n="cImpulses">impulses</span></label>
    <label><input type="checkbox" id="cLabels"> <span data-i18n="cLabels">labels</span></label></div>
  <div class="group"><button id="bSim" data-i18n="cSimulate">▶ simulate activity</button></div>
</div>

<div id="tip"></div>

<div id="inside">
  <div class="card">
    <div class="close" data-i18n="close">esc / click outside — close</div>
    <div class="c-kind" id="iKind"></div>
    <h2 id="iTitle"></h2>
    <div class="addr" id="iAddr"></div>
    <div class="sec-label" data-i18n="secContent">full content</div>
    <div class="body" id="iBody"></div>
    <textarea id="iEdit"></textarea>
    <div class="editrow">
      <button class="b-edit" id="bEdit"></button>
      <button class="b-edit" id="bSave" style="display:none"></button>
      <button class="b-del" id="bDel"></button>
    </div>
    <div id="iUnderstood"></div>
    <div class="links" id="iLinks"></div>
  </div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
<script src="https://unpkg.com/force-graph@1.43.0/dist/force-graph.min.js"></script>
<script>
// ===================== i18n =====================
const I18N = {
  en: { appName:'MGI-Mind — the brain', intro:'Prototype. Hover (summary after ~1s), click a core to dive inside.',
    searchPh:'🔍 search cores…', filterAll:'all types', kMemory:'memory', kEntity:'entities', kLibrary:'regions',
    kEntitySing:'entity', kRegion:'region', regionsBtn:'regions ▾', regionPrefix:'region: ', allRegions:'★ all regions', reset:'reset',
    editor:'✎ editor', legCores:'CORES', legPulses:'IMPULSES', pWrite:'write', pRead:'read', pProcess:'process',
    cMode:'mode:', cPhysics:'physics:', phDynamic:'dynamic', phStatic:'static', phPin:'📌 pin', phReset:'↺ reset',
    cStyle:'style:', stNeon:'neon', stOrganic:'organic', stSchematic:'schematic',
    cCores:'cores:', shSphere:'spheres', shCrystal:'crystals', shPoint:'points',
    cBg:'bg:', bgNebula:'nebula', bgStars:'stars', bgPlain:'plain',
    cImpulses:'impulses', cLabels:'labels', cSimulate:'▶ simulate activity',
    close:'esc / click outside — close', secContent:'full content', understood:'how the agent understood it',
    neurons:'neurons (links)', cores:'cores', edit:'✎ edit', save:'💾 save to memory', del:'🗑 delete core',
    clickToEnter:'click to dive inside', noMatch:'no match', deleted:'🗑 deleted', saved:'💾 saved', pinned:'📌 layout pinned — survives reload', layoutReset:'↺ manual layout cleared',
    confirmDel:'Delete this core permanently?', kindMemory:'memory core', kindEntity:'entity', kindRegion:'region',
    mId:'id:', mRegion:'region:', mAuthor:'author:', mWritten:'written:', mLinks:'links:' },
  ru: { appName:'MGI-Mind — мозг', intro:'Прототип. Наведись (выжимка через ~1с), кликни на ядро — нырнёшь внутрь.',
    searchPh:'🔍 поиск по ядрам…', filterAll:'все типы', kMemory:'память', kEntity:'сущности', kLibrary:'регионы',
    kEntitySing:'сущность', kRegion:'регион', regionsBtn:'регионы ▾', regionPrefix:'регион: ', allRegions:'★ все регионы', reset:'сброс',
    editor:'✎ редактор', legCores:'ЯДРА', legPulses:'ИМПУЛЬСЫ', pWrite:'запись', pRead:'чтение', pProcess:'обработка',
    cMode:'режим:', cPhysics:'физика:', phDynamic:'динамика', phStatic:'статика', phPin:'📌 закрепить', phReset:'↺ сброс',
    cStyle:'стиль:', stNeon:'неон', stOrganic:'органик', stSchematic:'схема',
    cCores:'ядра:', shSphere:'сферы', shCrystal:'кристаллы', shPoint:'точки',
    cBg:'фон:', bgNebula:'туманность', bgStars:'звёзды', bgPlain:'пусто',
    cImpulses:'импульсы', cLabels:'подписи', cSimulate:'▶ симулировать активность',
    close:'esc / клик вне — выйти', secContent:'полный контент', understood:'как понял агент',
    neurons:'нейроны (связи)', cores:'ядер', edit:'✎ редактировать', save:'💾 сохранить в память', del:'🗑 удалить ядро',
    clickToEnter:'клик — нырнуть внутрь', noMatch:'нет совпадений', deleted:'🗑 удалено', saved:'💾 сохранено', pinned:'📌 положение закреплено — переживёт перезагрузку', layoutReset:'↺ ручная расстановка сброшена',
    confirmDel:'Удалить ядро навсегда?', kindMemory:'ядро памяти', kindEntity:'сущность', kindRegion:'регион',
    mId:'id:', mRegion:'регион:', mAuthor:'автор:', mWritten:'записано:', mLinks:'связей:' },
  de: { appName:'MGI-Mind — das Gehirn', intro:'Prototyp. Bewege die Maus (Zusammenfassung nach ~1s), klicke einen Kern zum Eintauchen.',
    searchPh:'🔍 Kerne suchen…', filterAll:'alle Typen', kMemory:'Gedächtnis', kEntity:'Entitäten', kLibrary:'Regionen',
    kEntitySing:'Entität', kRegion:'Region', regionsBtn:'Regionen ▾', regionPrefix:'Region: ', allRegions:'★ alle Regionen', reset:'zurücksetzen',
    editor:'✎ Editor', legCores:'KERNE', legPulses:'IMPULSE', pWrite:'Schreiben', pRead:'Lesen', pProcess:'Verarbeitung',
    cMode:'Modus:', cPhysics:'Physik:', phDynamic:'dynamisch', phStatic:'statisch', phPin:'📌 fixieren', phReset:'↺ zurück',
    cStyle:'Stil:', stNeon:'Neon', stOrganic:'organisch', stSchematic:'schematisch',
    cCores:'Kerne:', shSphere:'Kugeln', shCrystal:'Kristalle', shPoint:'Punkte',
    cBg:'Hintergrund:', bgNebula:'Nebel', bgStars:'Sterne', bgPlain:'leer',
    cImpulses:'Impulse', cLabels:'Beschriftungen', cSimulate:'▶ Aktivität simulieren',
    close:'esc / Klick außerhalb — schließen', secContent:'voller Inhalt', understood:'wie der Agent es verstand',
    neurons:'Neuronen (Verbindungen)', cores:'Kerne', edit:'✎ bearbeiten', save:'💾 in Gedächtnis speichern', del:'🗑 Kern löschen',
    clickToEnter:'klicken zum Eintauchen', noMatch:'kein Treffer', deleted:'🗑 gelöscht', saved:'💾 gespeichert', pinned:'📌 Layout fixiert — übersteht Neuladen', layoutReset:'↺ manuelles Layout gelöscht',
    confirmDel:'Diesen Kern endgültig löschen?', kindMemory:'Gedächtniskern', kindEntity:'Entität', kindRegion:'Region',
    mId:'id:', mRegion:'Region:', mAuthor:'Autor:', mWritten:'geschrieben:', mLinks:'Verbindungen:' },
};
let lang = localStorage.getItem('mind-lang') || 'en';
function t(k){ return (I18N[lang]&&I18N[lang][k]) || I18N.en[k] || k; }
function applyI18n(){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.dataset.i18n); });
  document.getElementById('search').placeholder=t('searchPh');
  document.getElementById('projbtn').textContent = filterLib ? (t('regionPrefix')+filterLib+' ▾') : t('regionsBtn');
  document.getElementById('editmode').textContent=t('editor');
  document.getElementById('langbtn').textContent='🌐 '+lang.toUpperCase();
  document.getElementById('bEdit').textContent=t('edit');
  document.getElementById('bSave').textContent=t('save');
  document.getElementById('bDel').textContent=t('del');
}

// ===================== MOCK DATA (shaped like /api/graph + /api/node) =====================
const COLORS = { memory:'#39d98a', entity:'#c792ff', library:'#ffd166' };
const PULSE = { write:'#39d98a', read:'#3aa0ff', process:'#ffb020' };
// ----- live API (token from URL ?token=, bearer auth) -----
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const AUTH = { headers: { Authorization: 'Bearer ' + TOKEN } };
async function apiGet(path){ const r=await fetch(path, AUTH); if(!r.ok) throw new Error(r.status); return r.json(); }

let DATA = { nodes:[], links:[] };
const DEG={};
function computeDegrees(){ for(const k in DEG) delete DEG[k];
  for(const l of DATA.links){ const s=l.source.id||l.source,t2=l.target.id||l.target; DEG[s]=(DEG[s]||0)+1; DEG[t2]=(DEG[t2]||0)+1; } }

// Load the brain graph from /api/graph and normalize to {nodes,links}. The
// backend returns nodes {id,label,kind} and edges {source,target,label,kind};
// memory cores carry author/library via /api/node on demand (lazy).
async function loadGraph(){
  try {
    const g = await apiGet('/api/graph?limit=400');
    DATA = {
      nodes: g.nodes.map(n=>({ ...n, full:n.full||null })),
      links: (g.edges||g.links||[]).map(e=>({ source:e.source, target:e.target, label:e.label, kind:e.kind })),
    };
  } catch(e){ console.error('graph load failed', e); DATA={nodes:[],links:[]}; }
  computeDegrees();
}

// ===================== STATE =====================
let mode='3d', style='neon', showPulse=true, showLabels=false, G=null, hoverTimer=null;
let coreShape='sphere', bgMode='nebula', filterKind='', filterLib='', physMode='dynamic';
const tip=document.getElementById('tip'), inside=document.getElementById('inside');

function nodeColor(n){ return COLORS[n.kind]||'#88aaff'; }
function nodeSize(n){ const d=DEG[n.id]||0; const base=n.kind==='library'?7:n.kind==='entity'?3.5:2; return base+Math.sqrt(d)*1.8; }
function linkColor(l){ if(l.kind==='fact')return 'rgba(199,146,255,.5)'; if(l.kind==='holds')return 'rgba(120,150,200,.25)'; return 'rgba(80,200,140,.22)'; }

// ----- glow + cores -----
let GLOW_TEX=null;
function glowTexture(){ if(GLOW_TEX)return GLOW_TEX;
  const c=document.createElement('canvas'); c.width=c.height=128; const g=c.getContext('2d');
  const grd=g.createRadialGradient(64,64,0,64,64,64); grd.addColorStop(0,'rgba(255,255,255,1)');
  grd.addColorStop(0.25,'rgba(255,255,255,.6)'); grd.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=grd; g.fillRect(0,0,128,128); GLOW_TEX=new THREE.CanvasTexture(c); return GLOW_TEX; }
let ORGANIC_MESHES=[];
function coreObject(n){
  const col=new THREE.Color(nodeColor(n)); const r=nodeSize(n); const grp=new THREE.Group();
  if(coreShape==='point'){
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTexture(),color:col,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    sp.userData.baseOp=1; sp.scale.set(r*3.2,r*3.2,1); grp.add(sp);
    if(showLabels){const l=textSprite(n.label||n.id,nodeColor(n)); l.position.set(0,r+3,0); grp.add(l);} return grp;
  }
  let geo,mat;
  if(coreShape==='ico'){ geo=new THREE.OctahedronGeometry(r*1.25,0);
    mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:style==='schematic'?0.3:0.7,roughness:.15,metalness:.7,flatShading:true}); }
  else { geo=new THREE.SphereGeometry(r,28,28);
    mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:style==='schematic'?0.35:(style==='organic'?0.6:1.2),roughness:style==='organic'?0.75:0.3,metalness:style==='organic'?0:0.15}); }
  const mesh=new THREE.Mesh(geo,mat); grp.add(mesh);
  if(style!=='schematic'){
    const gs=coreShape==='ico'?r*3.5:(style==='organic'?r*4:r*6.5); const go=coreShape==='ico'?0.5:(style==='organic'?0.45:0.9);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTexture(),color:col,transparent:true,opacity:go,blending:THREE.AdditiveBlending,depthWrite:false}));
    spr.userData.baseOp=go; spr.scale.set(gs,gs,1); grp.add(spr);
  }
  if(style==='organic'){ mesh.userData.spin=(Math.random()*0.4+0.2)*0.01; ORGANIC_MESHES.push(mesh); }
  if(showLabels){const l=textSprite(n.label||n.id,nodeColor(n)); l.position.set(0,r+3,0); grp.add(l);}
  return grp;
}
function animateOrganic(){ for(const m of ORGANIC_MESHES){ if(m.parent){ m.rotation.y+=m.userData.spin||0.004; m.rotation.x+=0.002; } } requestAnimationFrame(animateOrganic); }
animateOrganic();
const TEXT_CACHE={};
function textSprite(text,color){ const key=text+'|'+color;
  if(!TEXT_CACHE[key]){ const tt=text.length>30?text.slice(0,30)+'…':text;
    const c=document.createElement('canvas'); const ctx=c.getContext('2d'); ctx.font='600 26px ui-sans-serif, system-ui, sans-serif';
    const w=Math.ceil(ctx.measureText(tt).width)+16; c.width=w; c.height=40; const x2=c.getContext('2d');
    x2.font='600 26px ui-sans-serif, system-ui, sans-serif'; x2.fillStyle='rgba(5,8,14,.7)'; x2.fillRect(0,0,w,40);
    x2.fillStyle=color; x2.textBaseline='middle'; x2.fillText(tt,8,22); TEXT_CACHE[key]={tex:new THREE.CanvasTexture(c),w}; }
  const {tex,w}=TEXT_CACHE[key]; const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false})); s.scale.set(w/26*4,6,1); return s;
}

// ===================== graph build =====================
function makeGraph(){
  ORGANIC_MESHES=[]; applySavedToData();
  const el=document.getElementById('graph'); el.innerHTML='';
  const lib=mode==='3d'?ForceGraph3D:ForceGraph;
  G=lib()(el).graphData(structuredClone(DATA)).backgroundColor('#05070d')
    .nodeColor(nodeColor).nodeVal(nodeSize).nodeLabel(()=>'').linkColor(linkColor)
    .linkWidth(l=>l.kind==='fact'?1.4:0.6).onNodeHover(onHover).onNodeClick(zoomInside);
  if(mode==='3d'){
    G.nodeThreeObject(coreObject)
     .linkDirectionalParticles(showPulse?2:0).linkDirectionalParticleWidth(2.2)
     .linkDirectionalParticleColor(l=>l.kind==='fact'?PULSE.process:l.kind==='mention'?PULSE.read:PULSE.write)
     .linkDirectionalParticleSpeed(0.006);
    setTimeout(addAmbience,80);
  }
  applyStyle(); setTimeout(applyPhysics,60);
  if(filterKind||filterLib) setTimeout(applyFilter,120);
}
function addAmbience(){
  if(mode!=='3d'||!G.scene) return; const scene=G.scene();
  if(!scene.getObjectByName('amb')){ const a=new THREE.AmbientLight(0x4060a0,0.7); a.name='amb'; scene.add(a);
    const p=new THREE.PointLight(0x88aaff,0.8); p.position.set(200,200,200); scene.add(p); }
  if(bgMode!=='plain'&&!scene.getObjectByName('stars')){ const N=1800,pos=new Float32Array(N*3);
    for(let i=0;i<N;i++){ const r=1400+Math.random()*1600,th=Math.random()*6.28,ph=Math.acos(2*Math.random()-1);
      pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph); }
    const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    const stars=new THREE.Points(g,new THREE.PointsMaterial({size:2.2,color:0xcdddff,transparent:true,opacity:.85,sizeAttenuation:false})); stars.name='stars'; scene.add(stars); }
  if(bgMode==='nebula'&&!scene.getObjectByName('neb')){ const neb=new THREE.Group(); neb.name='neb';
    [[0x3355aa,1600,[-700,300,-900]],[0x6633aa,1400,[800,-400,-1100]],[0x227799,1200,[200,600,-1400]]].forEach(([c,s,p])=>{
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTexture(),color:c,transparent:true,opacity:.18,blending:THREE.AdditiveBlending,depthWrite:false})); sp.scale.set(s,s,1); sp.position.set(...p); neb.add(sp); });
    scene.add(neb); }
}
function applyStyle(){ if(!G)return;
  if(style==='schematic'){ G.backgroundColor('#0e1420'); G.linkWidth(l=>l.kind==='fact'?1.4:0.7).linkOpacity(0.9); }
  else if(style==='organic'){ G.backgroundColor('#0a0805'); G.linkWidth(l=>l.kind==='fact'?2.2:1.2).linkOpacity(0.35); }
  else { G.backgroundColor('#04060e'); G.linkWidth(l=>l.kind==='fact'?1.2:0.5).linkOpacity(0.55); }
}

// ===================== physics: dynamic / static + saved layout =====================
const SAVED_KEY='mind-layout-v1';
function savedLayout(){ try{ return JSON.parse(localStorage.getItem(SAVED_KEY)||'{}'); }catch(e){ return {}; } }
function applySavedToData(){ const L=savedLayout();
  DATA.nodes.forEach(n=>{ const p=L[n.id]; if(p){ n.x=p.x;n.y=p.y;n.z=p.z; n.fx=p.x;n.fy=p.y;n.fz=p.z; } }); }
function applyPhysics(){ if(!G)return;
  if(physMode==='dynamic'){
    const link=G.d3Force&&G.d3Force('link'); if(link) link.distance(34).strength(0.08);
    const ch=G.d3Force&&G.d3Force('charge'); if(ch) ch.strength(-30);
    G.d3VelocityDecay&&G.d3VelocityDecay(0.32);
    G.graphData().nodes.forEach(n=>{ n.fx=undefined;n.fy=undefined;n.fz=undefined; });
    G.cooldownTicks&&G.cooldownTicks(200); G.d3ReheatSimulation&&G.d3ReheatSimulation();
    G.onNodeDrag(()=>{}); G.onNodeDragEnd(n=>{ if(n){ n.fx=undefined;n.fy=undefined;n.fz=undefined; } });
  } else {
    G.cooldownTicks&&G.cooldownTicks(0);
    G.graphData().nodes.forEach(n=>{ n.fx=n.x;n.fy=n.y; if('z' in n) n.fz=n.z; });
    G.onNodeDrag(n=>{ n.fx=n.x;n.fy=n.y; if('z' in n) n.fz=n.z; });
    G.onNodeDragEnd(n=>{ if(n){ n.fx=n.x;n.fy=n.y; if('z' in n) n.fz=n.z; } });
  }
}
function saveLayout(){ const L={}; G.graphData().nodes.forEach(n=>{ L[n.id]={x:n.x,y:n.y,z:n.z||0}; });
  localStorage.setItem(SAVED_KEY,JSON.stringify(L));
  DATA.nodes.forEach(n=>{ const g=G.graphData().nodes.find(x=>x.id===n.id); if(g){ n.x=g.x;n.y=g.y;n.z=g.z; } });
  toast(t('pinned')); }
function resetLayout(){ localStorage.removeItem(SAVED_KEY);
  DATA.nodes.forEach(n=>{ delete n.fx;delete n.fy;delete n.fz; }); toast(t('layoutReset')); makeGraph(); }

// ===================== filter (dim, no camera move) =====================
function nodeMatches(n){ if(filterKind&&n.kind!==filterKind) return false;
  if(filterLib){ if(n.id==='lib:'+filterLib) return true;
    const inLib=DATA.links.some(l=>l.kind==='holds'&&(l.source.id||l.source)==='lib:'+filterLib&&(l.target.id||l.target)===n.id);
    if(!inLib) return false; } return true; }
document.getElementById('filterKind').onchange=e=>{ filterKind=e.target.value; applyFilter(); };
function applyFilter(){ if(!G)return;
  const cam=(mode==='3d'&&G.cameraPosition)?G.cameraPosition():null; const data=G.graphData();
  if(mode==='3d'){
    data.nodes.forEach(n=>{ const obj=n.__threeObj; if(!obj)return; const on=nodeMatches(n);
      obj.traverse(o=>{ if(o.material){ if(o.isSprite){ o.material.opacity=on?(o.userData.baseOp??1):0.04; }
        else if(o.material.emissive){ o.material.emissiveIntensity=on?(style==='schematic'?0.4:1.1):0.06; o.material.transparent=!on; o.material.opacity=on?1:0.18; } } }); });
    data.links.forEach(l=>{ const lo=l.__lineObj; if(!lo||!lo.material)return; const s=l.source.id||l.source,tg=l.target.id||l.target;
      const sn=DATA.nodes.find(x=>x.id===s),tn=DATA.nodes.find(x=>x.id===tg); const lit=(!filterKind&&!filterLib)||(sn&&nodeMatches(sn))||(tn&&nodeMatches(tn));
      lo.material.transparent=true; lo.material.opacity=lit?0.6:0.04; });
  } else { G.nodeColor(n=>nodeMatches(n)?nodeColor(n):'rgba(120,140,180,0.12)').linkColor(l=>{
      const s=l.source.id||l.source,tg=l.target.id||l.target; const sn=DATA.nodes.find(x=>x.id===s),tn=DATA.nodes.find(x=>x.id===tg);
      const lit=(!filterKind&&!filterLib)||(sn&&nodeMatches(sn))||(tn&&nodeMatches(tn)); return lit?linkColor(l):'rgba(80,100,140,0.05)'; }); }
  if(cam) G.cameraPosition(cam,undefined,0);
}

// ===================== hover tooltip at cursor =====================
let MX=0,MY=0;
window.addEventListener('mousemove',e=>{ MX=e.clientX; MY=e.clientY; if(tip.style.display==='block') placeTip(); });
function placeTip(){ const w=tip.offsetWidth||220,h=tip.offsetHeight||80; let x=MX+16,y=MY+16;
  if(x+w>innerWidth-10)x=MX-w-16; if(y+h>innerHeight-10)y=MY-h-16; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function onHover(n){ clearTimeout(hoverTimer); tip.style.display='none'; if(!n)return;
  hoverTimer=setTimeout(()=>{ const meta=n.kind==='memory'?(t('kindMemory')+(n.full?' · ~'+n.full.length:'')):n.kind;
    tip.innerHTML=`<div class="t-kind" style="color:${nodeColor(n)}">${n.kind}</div><div class="t-title">${n.full||n.label||n.id}</div><div class="t-meta">${meta} · ${t('clickToEnter')}</div>`;
    tip.style.display='block'; placeTip(); },1000); }

// ===================== dive inside =====================
let curNode=null;
async function loadNodeDetail(n){
  // lazy: the graph only carries short labels; fetch full content on click
  if(n.__loaded) return;
  try{
    const d=await apiGet('/api/node/'+encodeURIComponent(n.id));
    if(d.kind==='memory' && d.detail){
      n.full=d.detail.content||n.full; n.author=d.detail.author; n.lib=d.detail.library; n.date=d.detail.created_at;
    } else if(d.kind==='library'){
      n.full=(d.members||[]).map(m=>'• '+m.snippet).join('\n\n') || '(empty region)';
    } else if(d.kind==='entity'){
      n.full=(d.facts||[]).map(f=>f.subject+' '+f.predicate+' '+f.object).join('\n') || '('+n.id+')';
    }
    n.__loaded=true;
  }catch(e){ /* keep whatever label we have */ }
}
function zoomInside(n){ clearTimeout(hoverTimer); tip.style.display='none'; curNode=n;
  inside.classList.remove('edit-open'); document.getElementById('bSave').style.display='none'; document.getElementById('bEdit').style.display='inline-block';
  if(mode==='3d'&&G.cameraPosition){ const ratio=1+40/Math.hypot(n.x||1,n.y||1,n.z||1); G.cameraPosition({x:(n.x||0)*ratio,y:(n.y||0)*ratio,z:(n.z||0)*ratio},n,700); }
  loadNodeDetail(n).then(()=>renderInside(n));
  setTimeout(()=>renderInside(n), mode==='3d'?500:0);
}
function renderInside(n){
  {
    const kindRu={memory:t('kindMemory'),entity:t('kindEntity'),library:t('kindRegion')}[n.kind]||n.kind;
    document.getElementById('iKind').textContent=kindRu; document.getElementById('iKind').style.color=nodeColor(n);
    document.getElementById('iTitle').textContent=n.kind==='memory'?(n.label+'…'):(n.label||n.id);
    const A=[]; A.push('<b>'+t('mId')+'</b> '+n.id); if(n.lib)A.push('<b>'+t('mRegion')+'</b> '+n.lib);
    if(n.author)A.push('<b>'+t('mAuthor')+'</b> '+n.author); if(n.date)A.push('<b>'+t('mWritten')+'</b> '+n.date);
    A.push('<b>'+t('mLinks')+'</b> '+(DEG[n.id]||0)); document.getElementById('iAddr').innerHTML=A.join('  ·  ');
    document.getElementById('iBody').textContent=n.full||('('+n.kind+' — /api/node/'+n.id+')');
    document.getElementById('iUnderstood').innerHTML=n.understood?'<div class="understood"><div class="u-label">'+t('understood')+'</div><div class="u-text">'+n.understood+'</div></div>':'';
    const rel=DATA.links.filter(l=>l.source===n.id||l.target===n.id||(l.source.id||l.source)===n.id||(l.target.id||l.target)===n.id).slice(0,12);
    document.getElementById('iLinks').innerHTML=rel.length?('<h3>'+t('neurons')+'</h3>'+rel.map(l=>{ const sid=l.source.id||l.source,tid=l.target.id||l.target;
      const other=sid===n.id?tid:sid; const arrow=sid===n.id?'→':'←'; return `<div class="link">${arrow} <span style="opacity:.6">${l.kind}</span> ${other}</div>`; }).join('')):'';
    inside.classList.add('show'); inside.querySelector('.card').scrollTop=0;
  }
}
inside.addEventListener('click',e=>{ if(e.target===inside||e.target.classList.contains('close')) inside.classList.remove('show'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') inside.classList.remove('show'); });

// ===================== simulate pulses =====================
function simulate(){ if(!G)return; let n=0; const iv=setInterval(()=>{ const links=G.graphData().links; const l=links[Math.floor(Math.random()*links.length)];
  if(mode==='3d'&&G.emitParticle) G.emitParticle(l); if(++n>30) clearInterval(iv); },220); }

// ===================== controls =====================
function setBtn(on,off){ document.getElementById(on).classList.add('on'); document.getElementById(off).classList.remove('on'); }
document.getElementById('b3d').onclick=()=>{mode='3d';setBtn('b3d','b2d');makeGraph();};
document.getElementById('b2d').onclick=()=>{mode='2d';setBtn('b2d','b3d');makeGraph();};
document.getElementById('pDyn').onclick=()=>{physMode='dynamic';setBtn('pDyn','pStat');applyPhysics();};
document.getElementById('pStat').onclick=()=>{physMode='static';setBtn('pStat','pDyn');applyPhysics();};
document.getElementById('pSave').onclick=saveLayout;
document.getElementById('pReset').onclick=resetLayout;
document.querySelectorAll('[data-style]').forEach(b=>b.onclick=()=>{ document.querySelectorAll('[data-style]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); style=b.dataset.style; makeGraph(); });
document.querySelectorAll('[data-shape]').forEach(b=>b.onclick=()=>{ document.querySelectorAll('[data-shape]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); coreShape=b.dataset.shape; makeGraph(); });
document.querySelectorAll('[data-bg]').forEach(b=>b.onclick=()=>{ document.querySelectorAll('[data-bg]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); bgMode=b.dataset.bg; makeGraph(); });
document.getElementById('cPulse').onchange=e=>{showPulse=e.target.checked;makeGraph();};
document.getElementById('cLabels').onchange=e=>{showLabels=e.target.checked;makeGraph();};
document.getElementById('bSim').onclick=simulate;

// search
function focusNode(n){ if(!n)return; if(mode==='3d'&&G.cameraPosition){ const ratio=1+60/Math.hypot(n.x||1,n.y||1,n.z||1); G.cameraPosition({x:(n.x||0)*ratio,y:(n.y||0)*ratio,z:(n.z||0)*ratio},n,900);} else if(G.centerAt){ G.centerAt(n.x,n.y,800); G.zoom(4,800);} }
const search=document.getElementById('search');
search.addEventListener('keydown',e=>{ if(e.key!=='Enter')return; const q=search.value.toLowerCase().trim(); if(!q)return;
  const hit=DATA.nodes.find(n=>(n.full||n.label||n.id).toLowerCase().includes(q)); if(hit)focusNode(hit); else { const old=search.placeholder; search.value=''; search.placeholder=t('noMatch'); setTimeout(()=>search.placeholder=t('searchPh'),1400);} });

// regions dropdown — filters (no camera move)
const projbtn=document.getElementById('projbtn'), projlist=document.getElementById('projlist');
function buildProjList(){ const libs=DATA.nodes.filter(n=>n.kind==='library');
  projlist.innerHTML=`<div class="item ${filterLib===''?'active':''}" data-lib=""><span>${t('allRegions')}</span><span class="c">${t('reset')}</span></div>`+
    libs.map(l=>{ const name=l.label; const count=DATA.links.filter(x=>(x.source.id||x.source)===l.id&&x.kind==='holds').length;
      return `<div class="item ${filterLib===name?'active':''}" data-lib="${name}"><span>${name}</span><span class="c">${count} ${t('cores')}</span></div>`; }).join('');
  projlist.querySelectorAll('.item').forEach(it=>it.onclick=()=>{ filterLib=it.dataset.lib;
    projbtn.textContent=filterLib?(t('regionPrefix')+filterLib+' ▾'):t('regionsBtn'); projlist.classList.remove('show'); applyFilter(); }); }
projbtn.onclick=()=>{ buildProjList(); projlist.classList.toggle('show'); };

// language dropdown
const langbtn=document.getElementById('langbtn'), langlist=document.getElementById('langlist');
function buildLangList(){ const names={en:'English',ru:'Русский',de:'Deutsch'};
  langlist.innerHTML=Object.keys(I18N).map(l=>`<div class="item ${l===lang?'active':''}" data-lang="${l}"><span>${names[l]}</span><span class="c">${l.toUpperCase()}</span></div>`).join('');
  langlist.querySelectorAll('.item').forEach(it=>it.onclick=()=>{ lang=it.dataset.lang; localStorage.setItem('mind-lang',lang); langlist.classList.remove('show'); applyI18n(); }); }
langbtn.onclick=()=>{ buildLangList(); langlist.classList.toggle('show'); };

document.addEventListener('click',e=>{ if(!e.target.closest('#projmenu')) projlist.classList.remove('show'); if(!e.target.closest('#langmenu')) langlist.classList.remove('show'); });

// edit mode
let editMode=false;
const emBtn=document.getElementById('editmode');
emBtn.onclick=()=>{ editMode=!editMode; emBtn.classList.toggle('on',editMode); inside.classList.toggle('editing',editMode); };
document.getElementById('bEdit').onclick=()=>{ inside.classList.add('edit-open'); document.getElementById('iEdit').value=curNode?.full||'';
  document.getElementById('bEdit').style.display='none'; document.getElementById('bSave').style.display='inline-block'; };
document.getElementById('bSave').onclick=async()=>{ if(!curNode)return; const v=document.getElementById('iEdit').value;
  document.getElementById('iBody').textContent=v; inside.classList.remove('edit-open');
  document.getElementById('bSave').style.display='none'; document.getElementById('bEdit').style.display='inline-block';
  try{ const r=await fetch('/api/node/'+encodeURIComponent(curNode.id)+'?token='+TOKEN,
        { method:'PATCH', headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'}, body:JSON.stringify({content:v}) });
    if(!r.ok) throw new Error(r.status); toast(t('saved'));
  }catch(e){ toast('save failed: '+e.message); }
  await reload(); };
document.getElementById('bDel').onclick=async()=>{ if(!curNode)return; if(!confirm(t('confirmDel')+'\n\n'+(curNode.label||curNode.id)))return;
  const id=curNode.id; inside.classList.remove('show');
  // only memory cores are deletable on the backend (mem:<uuid>)
  if(id.startsWith('mem:')){
    try{ const r=await fetch('/api/memories/'+encodeURIComponent(id.slice(4))+'?token='+TOKEN,
          { method:'DELETE', headers:{Authorization:'Bearer '+TOKEN} });
      if(!r.ok) throw new Error(r.status); toast(t('deleted'));
    }catch(e){ toast('delete failed: '+e.message); }
  } else { toast('only memory cores are deletable'); }
  await reload(); };

// reload the graph from the server and rebuild
async function reload(){ await loadGraph(); makeGraph(); }

function toast(msg){ let el=document.getElementById('toast'); if(!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el);
  el.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(20,40,70,.95);border:1px solid rgba(120,160,255,.4);color:#dce8ff;padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:opacity .3s'; }
  el.textContent=msg; el.style.opacity='1'; clearTimeout(el._h); el._h=setTimeout(()=>el.style.opacity='0',2200); }

// ===================== live pulse feed (SSE) =====================
// Each event is an impulse the brain just emitted; flash it along a matching
// link so you "see the data move". Colors come from the backend (kind→color).
function startPulseFeed(){
  try{
    const es=new EventSource('/api/pulse?token='+TOKEN);
    es.onmessage=(ev)=>{
      let p; try{ p=JSON.parse(ev.data); }catch(e){ return; }
      // find a link touching the target core and emit a particle on it
      if(mode!=='3d'||!G.emitParticle) return;
      const links=G.graphData().links;
      const l=links.find(x=>(x.target.id||x.target)===p.target || (x.source.id||x.source)===p.target);
      if(l) G.emitParticle(l);
    };
    es.onerror=()=>{ /* server may be down; EventSource auto-retries */ };
  }catch(e){ console.warn('pulse feed unavailable', e); }
}

// ===================== init =====================
applyI18n();
(async()=>{ await loadGraph(); makeGraph(); startPulseFeed(); })();
