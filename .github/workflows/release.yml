name: Release

# Build the three OS binaries on a version tag and attach them to a GitHub Release,
# so users download a binary instead of installing a Rust toolchain to build it.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # ort uses load-dynamic, so no ONNX Runtime is needed at build time; the binary
        # downloads it (and Qdrant + models) at runtime via `mgimind doctor --fix`.
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/mgimind"
          out="mgimind-${{ matrix.target }}.tar.gz"
          tar -czf "$out" -C "$(dirname "$bin")" mgimind
          # SHA-256 in the canonical `shasum -c`-compatible format ("<hex>  <name>")
          # so install.sh can verify the download with one command.
          if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$out" > "$out.sha256"
          else
              shasum -a 256 "$out" > "$out.sha256"
          fi
          echo "ASSET=$out" >> "$GITHUB_ENV"
          echo "ASSET_SHA=$out.sha256" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/mgimind.exe"
          $out = "mgimind-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $out
          # Match the Unix `shasum -c` format ("<hex>  <name>") for consistency,
          # even though install.ps1 parses the hex itself.
          $hash = (Get-FileHash -Algorithm SHA256 -Path $out).Hash.ToLower()
          "$hash  $out" | Out-File -FilePath "$out.sha256" -Encoding ascii -NoNewline
          "ASSET=$out"          | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_SHA=$out.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}
          fail_on_unmatched_files: true
