name: Release

# Build the three OS binaries on a version tag and attach them to a GitHub Release,
# so users download a binary instead of installing a Rust toolchain to build it.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # ort uses load-dynamic, so no ONNX Runtime is needed at build time; the binary
        # downloads it (and Qdrant + models) at runtime via `mgimind doctor --fix`.
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/mgimind"
          out="mgimind-${{ matrix.target }}.tar.gz"
          tar -czf "$out" -C "$(dirname "$bin")" mgimind
          echo "ASSET=$out" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/mgimind.exe"
          $out = "mgimind-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $out
          "ASSET=$out" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
