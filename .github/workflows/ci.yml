name: CI

on:
  push:
    branches: [main, v2]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt, clippy, test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        # ort uses load-dynamic, so no ONNX Runtime is needed at build time.
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        # Integration tests skip unless MGIMIND_IT_QDRANT is set (see the
        # integration job), so this runs the pure unit suite on every platform.
        run: cargo test --all

  integration:
    name: integration (real Qdrant)
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.1
        ports:
          - 6333:6333
          - 6334:6334
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "Qdrant did not become ready" >&2
          exit 1

      # Cache the downloaded models so the retrieval test is a real CI gate without
      # re-downloading ~550 MB on every run. Keyed on integrity.rs (the pins), so the
      # cache busts when a model changes.
      - name: Cache models
        uses: actions/cache@v4
        with:
          path: ~/mgimind/models
          key: mgimind-models-${{ hashFiles('src/integrity.rs') }}

      - name: Build binary and fetch models
        run: |
          cargo build --release
          ./target/release/mgimind init
          # Downloads ONNX Runtime + the e5 and reranker models (skips what is cached).
          # The Qdrant service is already up, so we do not need the bundled qdrant.
          ./target/release/mgimind doctor --fix

      - name: Integration tests against Qdrant (lifecycle + real add->search)
        env:
          MGIMIND_IT_QDRANT: "6334"
          ORT_DYLIB_PATH: ${{ github.workspace }}/target/release/libonnxruntime.so
        run: |
          export MGIMIND_IT_MODELS="$HOME/mgimind/models"
          cargo test --test cli_integration -- --nocapture

  integration-windows:
    name: integration (windows, bundled Qdrant)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Windows runners cannot run Linux service containers, so there is no Qdrant
      # `services:` here. Instead we use the binary's own bundled Qdrant: `doctor
      # --fix` downloads qdrant.exe + the ONNX Runtime DLL + the models, and
      # `serve` starts Qdrant detached on 6333/6334. This covers the add->search
      # retrieval path on the main target OS.
      - name: Cache models
        uses: actions/cache@v4
        with:
          path: ~/mgimind/models
          key: mgimind-models-win-${{ hashFiles('src/integrity.rs') }}

      - name: Build, fetch runtime + models, start bundled Qdrant
        shell: pwsh
        run: |
          cargo build --release
          ./target/release/mgimind.exe init
          ./target/release/mgimind.exe doctor --fix
          ./target/release/mgimind.exe serve
          # Wait for the bundled Qdrant to accept on the REST port before testing.
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            try { Invoke-WebRequest -UseBasicParsing http://localhost:6333/readyz | Out-Null; $ready = $true; break }
            catch { Start-Sleep -Seconds 1 }
          }
          if (-not $ready) { Write-Error "Qdrant did not become ready"; exit 1 }

      - name: Integration tests against bundled Qdrant (lifecycle + real add->search)
        shell: pwsh
        env:
          MGIMIND_IT_QDRANT: "6334"
          ORT_DYLIB_PATH: ${{ github.workspace }}/target/release/onnxruntime.dll
        run: |
          $env:MGIMIND_IT_MODELS = "$HOME/mgimind/models"
          cargo test --test cli_integration -- --nocapture

  audit:
    name: cargo-audit (vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        # rc dependency (ort) may surface advisories; don't fail the build on them yet.
        run: cargo audit || true
